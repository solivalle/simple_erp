version: "3.9"

services:

  db:
    image: postgres:15
    container_name: simple_erp_db
    restart: always
    environment:
      POSTGRES_DB: tienda
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: my_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: .
    container_name: simple_erp_app
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      DB_NAME: tienda
      DB_USER: postgres
      DB_PASSWORD: my_pass
      DB_HOST: db
      DB_PORT: 5432

volumes:
  postgres_data: